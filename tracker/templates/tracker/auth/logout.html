<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signed Out — UtangTracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#EDE8E1;--surface:#FFFFFF;--border:#DDD8D0;--navy:#1C2E4A;--navy-dark:#111E30;--text:#1A1611;--text-2:#5C5449;--text-3:#9C9287;--success:#166534;--success-bg:#F0FDF4;--success-bd:#BBF7D0;--serif:'Lora',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;--r-sm:6px;--r-lg:14px;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{font-size:15px;}
    body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
    .auth-nav{display:flex;align-items:center;justify-content:space-between;padding:0 36px;height:52px;background:var(--navy);}
    .auth-nav-brand{display:flex;align-items:center;gap:8px;text-decoration:none;}
    .nav-dot{width:8px;height:8px;background:#3B82F6;border-radius:50%;}
    .nav-brand-name{font-family:var(--serif);font-size:0.95rem;font-weight:600;color:#fff;}
    .auth-body{flex:1;display:flex;align-items:center;justify-content:center;padding:36px 16px;}
    .outer{width:100%;max-width:360px;text-align:center;animation:rise 0.32s cubic-bezier(0.16,1,0.3,1);}
    @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:36px 28px;box-shadow:0 4px 20px rgba(26,22,17,0.08);}
    .check-wrap{width:62px;height:62px;background:var(--success-bg);border:1.5px solid var(--success-bd);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto 18px;animation:pop 0.42s 0.1s cubic-bezier(0.34,1.56,0.64,1) both;}
    @keyframes pop{from{transform:scale(0.5);opacity:0;}to{transform:scale(1);opacity:1;}}
    .title{font-family:var(--serif);font-size:1.35rem;font-weight:700;letter-spacing:-0.02em;margin-bottom:8px;}
    .msg{font-size:0.83rem;color:var(--text-2);line-height:1.6;margin-bottom:4px;}
    .sep{width:32px;height:1px;background:var(--border);margin:20px auto;}
    .btn-back{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px;background:var(--text);color:#fff;border:none;border-radius:var(--r-sm);font-family:var(--sans);font-size:0.9rem;font-weight:600;cursor:pointer;text-decoration:none;box-shadow:0 2px 8px rgba(26,22,17,0.15);transition:background 0.14s,transform 0.12s;}
    .btn-back:hover{background:#2d2820;transform:translateY(-1px);}
    .footer-note{margin-top:16px;font-size:0.7rem;color:var(--text-3);}
  </style>
</head>
<body>
  <nav class="auth-nav">
    <a href="/" class="auth-nav-brand"><div class="nav-dot"></div><span class="nav-brand-name">UtangTracker</span></a>
  </nav>
  <div class="auth-body">
    <div class="outer">
      <div class="card">
        <div class="check-wrap">✓</div>
        <div class="title">You've been signed out.</div>
        <div class="msg">Your session has ended successfully.<br>Your store data is safe and secure.</div>
        <div class="sep"></div>
        <a href="{% url 'login' %}" class="btn-back">← Sign In Again</a>
      </div>
      <div class="footer-note">© UtangTracker · Store Debt Management</div>
    </div>
  </div>
</body>
</html>
